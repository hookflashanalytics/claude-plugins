<!--
  In-chat Results Analysis visualisation (starting point).
  Self-contained: inline CSS/SVG only (no external CDNs — safe in sandboxed artifacts).
  Claude: replace the DATA object with the real parsed + computed numbers, then
  render this as an artifact/widget. The "Generate Slides" button is the GATE —
  it does not auto-fire; the user clicks it (or replies "generate slides").
-->
<div id="ra-root" style="font-family:'Aptos',system-ui,sans-serif;color:#0E2841;max-width:820px">
  <style>
    #ra-root h2{font-size:18px;margin:0 0 2px}
    #ra-root .sub{color:#5b6b7a;font-size:13px;margin-bottom:16px}
    #ra-root table{border-collapse:collapse;width:100%;font-size:13px;margin:8px 0 4px}
    #ra-root th,#ra-root td{padding:6px 10px;text-align:right;border-bottom:1px solid #E8E8E8}
    #ra-root th:first-child,#ra-root td:first-child{text-align:left}
    #ra-root .badge{display:inline-block;padding:2px 10px;border-radius:12px;font-size:12px;font-weight:600}
    #ra-root .sig{background:#e6f4ea;color:#196B24}
    #ra-root .notsig{background:#fdecea;color:#b3261e}
    #ra-root .bar-row{display:flex;align-items:center;gap:8px;margin:4px 0;font-size:13px}
    #ra-root .bar-label{width:120px}
    #ra-root .bar-track{flex:1;background:#E8E8E8;border-radius:4px;overflow:hidden;height:20px}
    #ra-root .bar-fill{height:100%;background:#156082}
    #ra-root .kpi{border:1px solid #E8E8E8;border-radius:10px;padding:14px 16px;margin-bottom:14px}
    #ra-root button{background:#E97132;color:#fff;border:0;border-radius:8px;padding:10px 16px;
      font-size:14px;font-weight:600;cursor:pointer;margin-top:6px}
    #ra-root button:hover{filter:brightness(1.05)}
    #ra-root button.secondary{background:#156082}
  </style>

  <h2 id="ra-title">Results Analysis</h2>
  <div class="sub" id="ra-sub"></div>
  <div id="ra-kpis"></div>

  <button id="ra-slides">Generate Slides</button>
  <div class="sub" id="ra-gate-note" style="margin-top:6px"></div>
  <!-- NOTE: no download button here — the widget's sandboxed iframe blocks
       window.open / downloads. Put the workbook download_url as a plain TEXT
       link in the chat message alongside this widget instead. -->
</div>

<script>
// ---- REPLACE THIS with the real data ---------------------------------------
const DATA = {
  experiment: "TEST_01 – Example",
  property: "Example Store – GA4 (000000000)",
  dateRange: "2026-06-01 → 2026-06-29",
  downloadUrl: "",   // the signed workbook download_url from the tool output
  kpis: [
    { label: "Add to Cart",
      variations: [
        { name: "Original",    rate: 0.3601, uplift: null,     confidence: null,  significant: null },
        { name: "Variation 1", rate: 0.3587, uplift: -0.0041,  confidence: 0.123, significant: false }
      ] }
  ]
};
// ---------------------------------------------------------------------------

const pct = x => (x==null ? "—" : (x*100).toFixed(2)+"%");
const signed = x => (x==null ? "—" : (x*100>=0?"+":"")+(x*100).toFixed(2)+"%");

document.getElementById("ra-title").textContent = "Results Analysis — " + DATA.experiment;
document.getElementById("ra-sub").textContent = `${DATA.property}  ·  ${DATA.dateRange}`;

const host = document.getElementById("ra-kpis");
for (const kpi of DATA.kpis) {
  const max = Math.max(...kpi.variations.map(v => v.rate), 0.0001);
  const verdict = kpi.variations.find(v => v.significant != null);
  const sig = verdict && verdict.significant;
  const badge = verdict == null ? "" :
    `<span class="badge ${sig?'sig':'notsig'}">${sig?'Significant':'Not significant'}` +
    (verdict.confidence!=null?` · ${(verdict.confidence*100).toFixed(1)}% conf`:``)+`</span>`;
  const bars = kpi.variations.map(v =>
    `<div class="bar-row"><span class="bar-label">${v.name}</span>
       <span class="bar-track"><span class="bar-fill" style="width:${(v.rate/max*100).toFixed(1)}%"></span></span>
       <span style="width:70px">${pct(v.rate)}</span></div>`).join("");
  const rows = kpi.variations.map(v =>
    `<tr><td>${v.name}</td><td>${pct(v.rate)}</td><td>${signed(v.uplift)}</td>
        <td>${v.confidence==null?'—':(v.confidence*100).toFixed(1)+'%'}</td></tr>`).join("");
  host.insertAdjacentHTML("beforeend",
    `<div class="kpi"><div style="display:flex;justify-content:space-between;align-items:center">
       <strong>${kpi.label}</strong>${badge}</div>
       ${bars}
       <table><tr><th>Variation</th><th>Conv. rate</th><th>Uplift</th><th>Confidence</th></tr>${rows}</table>
     </div>`);
}

// The gate: click (or reply) to generate slides — never automatic.
const note = document.getElementById("ra-gate-note");
document.getElementById("ra-slides").onclick = () => {
  const msg = "Generate the results-analysis slide deck for " + DATA.experiment;
  if (window.sendPrompt) window.sendPrompt(msg);
  else note.textContent = 'This surface can\'t auto-trigger slides — reply: "generate slides".';
};
</script>
